<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board | Task Manager</title>
    <link rel="stylesheet" href="src/output.css" />
    <link rel="stylesheet" href="src/all.min.css" />
    <link rel="icon" href="src/download.png" />

  </head>

  <body class="bg-[#F4F7FA] min-h-screen flex flex-col">
    <!-- ===================== الهيدر ===================== -->
    <div
      class="w-full h-14 bg-linear-to-r from-[#503AF7] to-[#9811FB] flex flex-wrap justify-between"
    >
      <div class="container mx-auto flex flex-wrap justify-between">
        <div class="flex flex-row justify-center items-center gap-1.5">
          <i
            class="fa-solid fa-table-columns text-2xl"
            style="color: rgb(255, 255, 255)"
          ></i>
          <h3 class="font-bold text-[20px] text-white">Kanban</h3>
        </div>
        <div class="flex flex-row justify-center items-center">
          <!-- زرار إضافة تاسك جديد - له id عشان نربطه بالـ JS -->
          <button
            id="open-modal-btn"
            type="button"
            class="h-9 w-9 rounded-lg bg-[#A945FB] flex justify-center items-center hover:bg-[#B45BFC] transition-colors delay-100"
          >
            <i class="fa-solid fa-plus" style="color: rgb(255, 255, 255)"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- ===================== الأعمدة الثلاثة ===================== -->
    <div class="bg-[#F4F7FA] container mx-auto flex flex-col lg:flex-row gap-4 mt-9">
      <!-- عمود To Do -->
      <div
        class="w-full md:w-full lg:w-1/3 xl:w-1/3 border-[#E9EBEE] bg-[#FBFCFD] mb-4 rounded-2xl p-6 shadow-[0_0_6px_rgba(0,0,0,0.1)]"
      >
        <div class="flex flex-row gap-2 items-center">
          <div
            class="w-10 h-10 bg-[#F1F5F9] rounded-lg flex flex-row justify-center items-center"
          >
            <i
              class="fa-solid fa-clipboard-list text-1xl"
              style="color: rgb(98, 116, 142)"
            ></i>
          </div>
          <div>
            <h3 class="text-[16px] font-medium text-[#1d293d]">To Do</h3>
            <!-- id عشان نحدّث عدد التاسكات ديناميكياً -->
            <p id="todo-count" class="text-[12px] font-medium text-[#90a1b9]">0 tasks</p>
          </div>
        </div>
        <!-- id الحاوية اللي هتستقبل الكروت + تستقبل drag & drop -->
        <div id="todo-list" class="w-full transition-colors rounded-xl">
          <div class="py-16 flex flex-col justify-center items-center">
            <i
              class="fa-solid fa-folder-open text-4xl"
              style="color: rgb(197, 206, 219)"
            ></i>
            <span class="text-[14px] font-medium text-[#90a1b9]">No tasks yet</span>
            <span class="text-[14px] font-medium text-[#90a1b9]">Click + to add one</span>
          </div>
        </div>
      </div>

      <!-- عمود In Progress -->
      <div
        class="w-full md:w-full lg:w-1/3 xl:w-1/3 border-[#E9EBEE] bg-[#FBFCFD] mb-4 rounded-2xl p-6 shadow-[0_0_6px_rgba(0,0,0,0.1)]"
      >
        <div class="flex flex-row gap-2 items-center">
          <div
            class="w-10 h-10 bg-[#FFFBEB] rounded-lg flex flex-row justify-center items-center"
          >
            <i
              class="fa-solid fa-spinner text-1xl"
              style="color: rgb(254, 154, 0)"
            ></i>
          </div>
          <div>
            <h3 class="text-[16px] font-medium text-[#1d293d]">In Progress</h3>
            <p id="in-progress-count" class="text-[12px] font-medium text-[#90a1b9]">0 tasks</p>
          </div>
        </div>
        <div id="in-progress-list" class="w-full transition-colors rounded-xl">
          <div class="py-16 flex flex-col justify-center items-center">
            <i
              class="fa-solid fa-folder-open text-4xl"
              style="color: rgb(197, 206, 219)"
            ></i>
            <span class="text-[14px] font-medium text-[#90a1b9]">No tasks yet</span>
            <span class="text-[14px] font-medium text-[#90a1b9]">Click + to add one</span>
          </div>
        </div>
      </div>

      <!-- عمود Completed -->
      <div
        class="w-full md:w-full lg:w-1/3 xl:w-1/3 border-[#E9EBEE] bg-[#FBFCFD] mb-4 rounded-2xl p-6 shadow-[0_0_6px_rgba(0,0,0,0.1)]"
      >
        <div class="flex flex-row gap-2 items-center">
          <div
            class="w-10 h-10 bg-[#ECFDF5] rounded-lg flex flex-row justify-center items-center"
          >
            <i
              class="fa-solid fa-circle-check text-1xl"
              style="color: rgb(0, 188, 125)"
            ></i>
          </div>
          <div>
            <h3 class="text-[16px] font-medium text-[#1d293d]">Completed</h3>
            <p id="completed-count" class="text-[12px] font-medium text-[#90a1b9]">0 tasks</p>
          </div>
        </div>
        <div id="completed-list" class="w-full transition-colors rounded-xl">
          <div class="py-16 flex flex-col justify-center items-center">
            <i
              class="fa-solid fa-folder-open text-4xl"
              style="color: rgb(197, 206, 219)"
            ></i>
            <span class="text-[14px] font-medium text-[#90a1b9]">No tasks yet</span>
            <span class="text-[14px] font-medium text-[#90a1b9]">Click + to add one</span>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================== الفوتر ===================== -->
    <div class="py-4 bg-[#182438] text-white text-center text-sm mt-auto">
      Made with <i class="fa-solid fa-heart" style="color: rgb(200, 22, 22);"></i> By Ahmed Eltaranisi
    </div>

    <!-- =================================================================
         المودال الخاص بإضافة تاسك جديد
         - hidden: كلاس Tailwind بيخلي display:none، بنشيلها بالـ JS لما نفتح المودال
         - fixed + inset-0: تغطية الشاشة كلها بطبقة خلفية شفافة (backdrop)
    ==================================================================== -->
    <!-- المودال بـ inline styles عشان يشتغل صح مع أي إصدار Tailwind -->
    <div id="task-modal"
      style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55);
             z-index:50; justify-content:center; align-items:center; padding:16px;">

      <div style="background:#fff; width:100%; max-width:500px; border-radius:20px;
                  box-shadow:0 25px 60px rgba(0,0,0,0.3); overflow:hidden; margin:auto;">

        <!-- هيدر -->
        <div style="display:flex; justify-content:space-between; align-items:center;
                    padding:20px 24px 18px; border-bottom:1px solid #E9EBEE;">
          <h3 style="font-size:18px; font-weight:700; color:#1d293d; margin:0;">Create New Task</h3>
          <button id="close-modal-btn" type="button"
            style="width:32px; height:32px; border:none; background:transparent; cursor:pointer;
                   border-radius:50%; display:flex; align-items:center; justify-content:center;
                   color:#90a1b9; font-size:16px;"
            onmouseover="this.style.background='#F4F7FA'; this.style.color='#1d293d';"
            onmouseout="this.style.background='transparent'; this.style.color='#90a1b9';">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <!-- الفورم -->
        <form id="task-form" style="display:flex; flex-direction:column; gap:18px; padding:22px 24px 24px;">

          <!-- Task Title -->
          <div>
            <label style="display:flex; align-items:center; gap:6px; font-size:13px;
                          font-weight:600; color:#1d293d; margin-bottom:8px;">
              <i class="fa-solid fa-heading" style="color:#503AF7; font-size:12px;"></i>
              Task Title <span style="color:#ef4444; margin-left:2px;">*</span>
            </label>
            <input type="text" name="title" required maxlength="100"
              placeholder="What needs to be done?"
              style="width:100%; border:2px solid #E9EBEE; border-radius:12px; padding:12px 16px;
                     font-size:14px; color:#1d293d; outline:none; box-sizing:border-box;
                     transition:border-color 0.2s; font-family:inherit;"
              onfocus="this.style.borderColor='#503AF7';"
              onblur="this.style.borderColor='#E9EBEE';" />
          </div>

          <!-- Priority + Due Date في صف واحد -->
          <div style="display:flex; gap:16px;">
            <div style="flex:1;">
              <label style="display:flex; align-items:center; gap:6px; font-size:13px;
                            font-weight:600; color:#1d293d; margin-bottom:8px;">
                <i class="fa-solid fa-flag" style="color:#503AF7; font-size:12px;"></i>
                Priority
              </label>
              <select name="priority"
                style="width:100%; border:2px solid #E9EBEE; border-radius:12px; padding:12px 16px;
                       font-size:14px; color:#1d293d; outline:none; background:#fff;
                       cursor:pointer; box-sizing:border-box; transition:border-color 0.2s; font-family:inherit;"
                onfocus="this.style.borderColor='#503AF7';"
                onblur="this.style.borderColor='#E9EBEE';">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div style="flex:1;">
              <label style="display:flex; align-items:center; gap:6px; font-size:13px;
                            font-weight:600; color:#1d293d; margin-bottom:8px;">
                <i class="fa-regular fa-calendar" style="color:#503AF7; font-size:12px;"></i>
                Due Date
              </label>
              <input type="date" name="dueDate"
                style="width:100%; border:2px solid #E9EBEE; border-radius:12px; padding:12px 16px;
                       font-size:14px; color:#1d293d; outline:none; box-sizing:border-box;
                       transition:border-color 0.2s; font-family:inherit;"
                onfocus="this.style.borderColor='#503AF7';"
                onblur="this.style.borderColor='#E9EBEE';" />
            </div>
          </div>

          <!-- Description -->
          <div>
            <label style="display:flex; align-items:center; gap:6px; font-size:13px;
                          font-weight:600; color:#1d293d; margin-bottom:8px;">
              <i class="fa-solid fa-bars-staggered" style="color:#503AF7; font-size:12px;"></i>
              Description
            </label>
            <div style="position:relative;">
              <textarea id="task-description" name="description" maxlength="500" rows="4"
                placeholder="Add more details about this task..."
                style="width:100%; border:2px solid #E9EBEE; border-radius:12px; padding:12px 16px 28px 16px;
                       font-size:14px; color:#1d293d; outline:none; resize:none;
                       box-sizing:border-box; transition:border-color 0.2s; font-family:inherit;"
                onfocus="this.style.borderColor='#503AF7';"
                onblur="this.style.borderColor='#E9EBEE';"></textarea>
              <span id="char-counter"
                style="position:absolute; bottom:10px; right:12px; font-size:11px; color:#90a1b9;">0/500</span>
            </div>
          </div>

          <!-- الزرارات -->
          <div style="display:flex; gap:12px; margin-top:4px;">
            <button id="cancel-btn" type="button"
              style="flex:1; padding:14px; border:none; border-radius:12px; font-size:14px;
                     font-weight:600; color:#475569; background:#F1F5F9; cursor:pointer; font-family:inherit;"
              onmouseover="this.style.background='#E2E8F0';"
              onmouseout="this.style.background='#F1F5F9';">
              Cancel
            </button>
            <button type="submit"
              style="flex:1; padding:14px; border:none; border-radius:12px; font-size:14px;
                     font-weight:600; color:#fff; background:linear-gradient(135deg,#503AF7,#9811FB);
                     cursor:pointer; display:flex; align-items:center; justify-content:center;
                     gap:8px; font-family:inherit;"
              onmouseover="this.style.opacity='0.88';"
              onmouseout="this.style.opacity='1';">
              <i class="fa-solid fa-plus" style="font-size:13px;"></i>
              Add Task
            </button>
          </div>

        </form>
      </div>
    </div>

    <!-- ملف JS عادي (بدون import/export) - يعمل مباشرة من غير سيرفر أو type="module" -->
    <script src="./js/index.js"></script>
  </body>
</html>
